name: Deploy Pounce Sentinel Dashboard

on:
  push:
    branches:
      - main
    paths:
      - apps/dashboard/**
      - apps/dashboard/api/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/static-web-app-dashboard.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pounce-sentinel/dashboard build
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POUNCE_SENTINEL_DEV }}
          action: upload
          app_location: apps/dashboard/dist
          api_location: apps/dashboard/api
          skip_app_build: true
