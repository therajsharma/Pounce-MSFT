name: pounce-sentinel-policy-agent
description: >
  Agent Framework hosted agent that gates dependency installs and manifest edits
  through Pounce Sentinel policy tools before an autonomous agent proceeds.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Supply Chain Security
template:
  name: pounce-sentinel-policy-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: FOUNDRY_PROJECT_ENDPOINT
      value: "{{FOUNDRY_PROJECT_ENDPOINT}}"
    - name: POUNCE_SENTINEL_API_BASE_URL
      value: "{{POUNCE_SENTINEL_API_BASE_URL}}"
    - name: POUNCE_SENTINEL_API_KEY
      value: "{{POUNCE_SENTINEL_API_KEY}}"
  resources:
    - kind: model
      id: gpt-4.1-mini
      name: AZURE_AI_MODEL_DEPLOYMENT_NAME
